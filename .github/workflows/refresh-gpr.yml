name: Refresh GPR & Simulate

# GPR 팀별 점수를 받아 시뮬레이션을 다시 돌리고, 변경 시 커밋한다.
# main 에 커밋되면 deploy.yml 이 자동으로 사이트를 재배포한다.
on:
  schedule:
    - cron: '0 3,9,15,21 * * *' # 6시간마다: 00:00·06:00·12:00·18:00 KST (15·21·03·09 UTC)
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch league standings & brackets
        run: node scripts/fetchStandings.mjs # 정규시즌 순위 + LCK Road to MSI 대진표 자동 갱신

      - name: Fetch GPR scores & re-simulate
        run: node scripts/fetchGpr.mjs # 끝에서 simulateLol.mjs 자동 실행

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain client/src/data)" ]; then
            git add client/src/data/gprTeams.json client/src/data/lolSim.json client/src/data/lolStandings.json
            git commit -m "chore: 순위표·GPR 자동 갱신 및 시뮬레이션 재계산"
            git push
            echo "변경 사항 커밋·푸시 완료"
          else
            echo "변경 없음 — 커밋 생략"
          fi
