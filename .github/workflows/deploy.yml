name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# ✅ Node.js 24 즉시 강제 적용
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2          # ✅ v4 → v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0        # ✅ v4 → v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json

      - name: "Debug: show files and pwd"
        run: |
          pwd
          ls -la
          if [ -d "./client" ]; then
            echo "=== client ==="
            ls -la ./client
          fi
          if [ -d "./server" ]; then
            echo "=== server ==="
            ls -la ./server
          fi

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci --no-progress --silent

      - name: Build client
        working-directory: ./client
        run: npm run build --if-present

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3.0.1  # ✅ v3 → v3.0.1
        with:
          path: ./client/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4.0.5      # ✅ v4 → v4.0.5
