name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# upload-pages-artifact 내부의 upload-artifact가 아직 Node.js 20을 사용함
# 해당 액션이 공식 업데이트될 때까지 강제로 Node.js 24에서 실행
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json

      - name: "Debug: show files and pwd"
        run: |
          pwd
          ls -la
          if [ -d "./client" ]; then
            echo "=== client ==="
            ls -la ./client
          fi
          if [ -d "./server" ]; then
            echo "=== server ==="
            ls -la ./server
          fi

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci --no-progress --silent

      - name: Build client
        working-directory: ./client
        run: npm run build --if-present

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./client/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
